<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeKeeper" />
  <meta name="description" content="Mindful time block tracker for your day" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>TimeKeeper</title>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen active">
  <div class="setup-container">
    <div class="setup-header">
      <div class="logo-mark">⬡</div>
      <h1 class="setup-title">TimeKeeper</h1>
      <p class="setup-subtitle">Design your day with intention</p>
    </div>

    <div class="setup-card">
      <label class="field-label">Day starts at</label>
      <input type="time" id="day-start" class="time-input" value="06:00" />
    </div>

    <div class="setup-card">
      <label class="field-label">Your time blocks</label>
      <div id="task-list" class="task-list"></div>
      <button class="add-task-btn" id="add-task-btn">
        <span class="plus-icon">+</span> Add Block
      </button>
    </div>

    <div class="hours-summary">
      <span id="hours-used">0h</span>
      <span class="hours-sep">of</span>
      <span>24h</span>
      <div class="hours-bar-wrap">
        <div class="hours-bar" id="hours-bar"></div>
      </div>
    </div>

    <button class="start-btn" id="start-btn">Start My Day →</button>
  </div>
</div>

<!-- MAIN TRACKER SCREEN -->
<div id="tracker-screen" class="screen">

  <!-- TOP NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-logo">⬡ TK</div>
    <div class="nav-tasks" id="nav-tasks"></div>
    <button class="nav-settings-btn" id="nav-settings-btn" title="Edit / Reset">⚙</button>
  </nav>

  <!-- BLOCKS AREA -->
  <div class="blocks-container" id="blocks-container"></div>

  <!-- RUNNING TICKER -->
  <div class="running-ticker" id="running-ticker" style="display:none">
    <span class="ticker-dot"></span>
    <span id="ticker-label">—</span>
    <span id="ticker-elapsed">00:00:00</span>
  </div>

</div>

<!-- WARNING OVERLAY -->
<div class="warning-overlay" id="warning-overlay" style="display:none">
  <div class="warning-box">
    <div class="warning-icon">⚠</div>
    <div class="warning-title" id="warning-title">Time Exhausted</div>
    <div class="warning-msg" id="warning-msg">You've used all your allocated time for this block.</div>
    <button class="warning-close" id="warning-close">Got it</button>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 class="modal-title">New Time Block</h3>
    <label class="field-label">Task name</label>
    <input type="text" id="modal-task-name" class="modal-input" placeholder="e.g. Reading" maxlength="24" />
    <label class="field-label">Hours allocated</label>
    <div class="hours-stepper">
      <button class="step-btn" id="step-down">−</button>
      <div class="step-display">
        <span id="step-hours">1</span><span class="step-unit">h</span>
        <span id="step-mins">0</span><span class="step-unit">m</span>
      </div>
      <button class="step-btn" id="step-up">+</button>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm" id="modal-confirm">Add Block</button>
    </div>
  </div>
</div>

<script src="js/colors.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
